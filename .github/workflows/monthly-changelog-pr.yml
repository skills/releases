name: Monthly Changelog PR

on:
  schedule:
    # Run on the 1st day of each month at 9:00 AM UTC
    - cron: "0 9 1 * *"
  workflow_dispatch:

env:
  PR_BODY_TEMPLATE_FILE: ".github/templates/changelog-reminder-pr.md"
  CHANGELOG_TEMPLATE_FILE: ".github/templates/changelog-template.md"
  NEW_EXERCISE_LOOKBACK_DAYS: 30
  SKILLS_EXERCISE_REPO_TOPIC: "skills-course"

permissions:
  contents: read
  pull-requests: write

jobs:
  generate-changelog:
    name: Generate changelog text
    runs-on: ubuntu-latest
    outputs:
      CHANGELOG_TEXT: ${{ steps.build-changelog.outputs.updated-text }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List recent skills exercise repos
        uses: actions/github-script@v6
        id: list-new-exercises
        with:
          script: |
            const org = 'skills';
            const topic = process.env.SKILLS_EXERCISE_REPO_TOPIC;
            const daysLookback = parseInt(process.env.NEW_EXERCISE_LOOKBACK_DAYS);

            // Calculate date based on configurable lookback period
            const pastDate = new Date();
            pastDate.setDate(pastDate.getDate() - daysLookback);
            const dateFilter = pastDate.toISOString().split('T')[0];

            console.log(`Fetching all repositories in ${org} with topic ${topic} created since ${dateFilter}...`);

            const { data: repos } = await github.rest.search.repos({
              q: `org:${org} topic:${topic} created:>=${dateFilter} sort:created-desc`,
              per_page: 100
            });

            console.log(`Found ${repos.items.length} exercise repositories`);

            const formattedRepos = repos.items.map(repo => ({
              name: repo.name,
              url: repo.html_url,
              topics: repo.topics || [],
              description: repo.description || ''
            }));

            return formattedRepos;
      - name: Track template repository usage
        uses: actions/github-script@v6
        id: track-templates
        with:
          script: |
            const org = 'skills';
            const topic = process.env.SKILLS_EXERCISE_REPO_TOPIC;
            const daysLookback = parseInt(process.env.NEW_EXERCISE_LOOKBACK_DAYS);

            // Calculate date based on configurable lookback period
            const pastDate = new Date();
            pastDate.setDate(pastDate.getDate() - daysLookback);
            const dateFilter = pastDate.toISOString().split('T')[0];

            console.log(`Fetching all repositories in ${org} with topic ${topic}...`);

            // Get all repos with the skills-course topic
            const { data: repos } = await github.rest.search.repos({
              q: `org:${org} topic:${topic}`,
              per_page: 100
            });

            console.log(`Found ${repos.items.length} exercise repositories`);

            // Track usage for each template repo
            const templateUsage = [];

            for (const repo of repos.items) {
              // Check how many repositories were created with names containing this repo name in the last 30 days
              try {
                // Search for repositories that include this repo name in their name
                const { data: search } = await github.rest.search.repos({
                  q: `${repo.name} in:name created:>=${dateFilter}`,
                  per_page: 1
                });
                templateUsage.push({
                  name: repo.name,
                  url: repo.html_url,
                  usage_count: search.total_count,
                  description: repo.description || ''
                });

                console.log(`${repo.name}: ${search.total_count} repositories with similar name created since ${dateFilter}`);
              } catch (error) {
                console.log(`Error getting data for ${repo.name}: ${error.message}`);
              }
            }

            // Sort by usage count (highest first)
            templateUsage.sort((a, b) => b.usage_count - a.usage_count);

            console.log('Template usage statistics:');
            console.log(JSON.stringify(templateUsage, null, 2));

            return templateUsage;
      - name: Build changelog
        id: build-changelog
        uses: skills/action-text-variables@v1
        with:
          template-file: ${{ env.CHANGELOG_TEMPLATE_FILE }}
          template-vars: |
            {
              "new_exercises": ${{ steps.list-new-exercises.outputs.result }},
              "statistics": ${{ steps.track-templates.outputs.result }},
              "platform_enhancements": []
            }


  create-changelog-pr:
    name: Create Changelog Reminder Issue
    needs: generate-changelog
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get current date
        id: date
        run: |
          echo "YEAR=$(date +%Y)" >> $GITHUB_OUTPUT
          echo "MONTH=$(date +%B)" >> $GITHUB_OUTPUT

      - name: Create changelog file
        env:
          CHANGELOG_TEXT: ${{ needs.generate-changelog.outputs.CHANGELOG_TEXT }}
        run: |
          mkdir -p changelog
          echo "$CHANGELOG_TEXT" > changelog/${{ steps.date.outputs.YEAR }}-${{ steps.date.outputs.MONTH }}.md

      - run: cat changelog/${{ steps.date.outputs.YEAR }}-${{ steps.date.outputs.MONTH }}.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: add changelog for ${{ steps.date.outputs.MONTH }} ${{ steps.date.outputs.YEAR }}"
          title: "📝 Skills changelog for ${{ steps.date.outputs.MONTH }} ${{ steps.date.outputs.YEAR }}"
          body-path: ${{ env.PR_BODY_TEMPLATE_FILE }}
          branch: changelog-${{ steps.date.outputs.YEAR }}-${{ steps.date.outputs.MONTH }}
          base: main
          assignees: |
            FidelusAleksander
            chriswblake
            arilivigni
          draft: true
          labels: |
            monthly-changelog
          add-paths: |
            changelog/*.md

